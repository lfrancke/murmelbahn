name: Rust CI

on:
  push:
    branches: [main]
    paths:
      - 'lib/**'
      - 'web/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/rust-ci.yml'
  pull_request:
    paths:
      - 'lib/**'
      - 'web/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/rust-ci.yml'

concurrency:
  group: rust-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      # murmelbahn-lib is the durable core and is clippy-clean, so warnings are
      # denied there. murmelbahn-web is the old axum 0.6 API that the SvelteKit
      # migration replaces with an axum 0.8 rewrite; until that lands, run its
      # clippy informationally (do not deny) so CI is green, then switch it to
      # "-- -D warnings" once the rewrite is clippy-clean.
      - name: Clippy (lib)
        run: cargo clippy -p murmelbahn-lib --all-targets -- -D warnings
      - name: Clippy (web)
        run: cargo clippy -p murmelbahn-web --all-targets
      - name: Test
        run: cargo test --workspace
